<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alejandría Almacén - Movimientos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/almacen.css}">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-sbs py-0 mb-4">
        <div class="container-fluid px-4">
            <a class="navbar-brand py-3" href="#">Biblioteca Alejandría</a>
            <ul class="nav nav-tabs mx-auto">
                <li class="nav-item"><a class="nav-link active" th:href="@{/almacen/movimientos}">Movimientos</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/almacen/stock}">Stock General</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/almacen/alertar}">Alertas</a></li>
            </ul>

            <div class="d-flex align-items-center gap-3">
                <div class="text-end d-none d-md-block">
                    <div class="fw-bold text-dark mb-0" style="font-size: 0.85rem;">
                        <i class="bi bi-person-circle me-1 text-muted"></i> 
                        <span sec:authentication="name">usuario@correo.com</span>
                    </div>
                    <div class="text-muted" style="font-size: 0.75rem;">Almacén</div>
                </div>
                
                <form th:action="@{/logout}" method="post" class="m-0">
                    <button type="submit" class="btn btn-outline-danger btn-sm rounded-pill px-3 fw-semibold">
                        <i class="bi bi-box-arrow-right"></i> Salir
                    </button>
                </form>
            </div>
        </div>
    </nav>

    <div class="container-fluid px-4 py-4">
        
        <div th:if="${exito}" class="alert alert-success alert-dismissible fade show shadow-sm" role="alert">
            <i class="bi bi-check-circle-fill me-2"></i><span th:text="${exito}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show shadow-sm" role="alert">
            <i class="bi bi-exclamation-triangle-fill me-2"></i><span th:text="${error}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>

        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="fw-semibold">Movimientos de Inventario</h2>
            <button class="btn btn-maroon rounded-pill px-4" data-bs-toggle="modal" data-bs-target="#modalMovimiento">
                <i class="bi bi-plus-lg"></i> Registrar Movimiento
            </button>
        </div>

        <div class="table-responsive table-custom">
            <table class="table table-hover align-middle mb-0">
                <thead>
                    <tr>
                        <th>MOVIMIENTO</th>
                        <th>LIBRO</th>
                        <th>SUCURSAL</th>
                        <th>TIPO</th>
                        <th>CANTIDAD</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:if="${#lists.isEmpty(listaMovimientos)}">
                        <td colspan="5" class="text-center text-muted py-4">No hay movimientos registrados aún.</td>
                    </tr>
                    
                    <tr th:each="mov : ${listaMovimientos}">
                        <td>
    						<span class="fw-bold" th:text="${'#MOV-' + mov.id}">#1</span><br>
    						<small class="text-muted" th:text="${mov.fechaMovimiento != null ? #temporals.format(mov.fechaMovimiento, 'dd/MM/yyyy HH:mm') : 'Sin fecha'}">Fecha</small>
						</td>
                        
                        <td>
                            <div class="d-flex align-items-center">
                                <img th:if="${mov.libro != null && mov.libro.isbn != null}" 
                                     th:src="@{'https://covers.openlibrary.org/b/isbn/' + ${mov.libro.isbn} + '-S.jpg'}" 
                                     alt="Portada" width="35" height="50" class="me-3 rounded shadow-sm object-fit-cover"
                                     onerror="this.src='https://via.placeholder.com/35x50?text=Libro'">
                                
                                <div>
                                    <span class="fw-semibold" th:text="${mov.libro != null ? mov.libro.titulo : 'Libro Desconocido'}">Título</span><br>
                                    <small class="text-muted" th:text="${mov.libro != null ? 'ISBN: ' + mov.libro.isbn : ''}">ISBN</small>
                                </div>
                            </div>
                        </td>

                        <td>
                            <span th:text="${mov.sucursal != null ? mov.sucursal.nombre : 'Sin sucursal'}">Central</span>
                        </td>
                        
                        <td>
                            <span class="badge bg-success bg-opacity-10 text-success border border-success" 
                                  th:if="${mov.tipoMovimiento.name() == 'INGRESO_PROVEEDOR' or mov.tipoMovimiento.name() == 'DEVOLUCION' or mov.tipoMovimiento.name() == 'TRASLADO_ENTRADA'}">
                                Entrada
                            </span>
                            <span class="badge bg-danger bg-opacity-10 text-danger border border-danger" 
                                  th:if="${mov.tipoMovimiento.name() == 'VENTA_FISICA' or mov.tipoMovimiento.name() == 'VENTA_ONLINE' or mov.tipoMovimiento.name() == 'MERMA' or mov.tipoMovimiento.name() == 'TRASLADO_SALIDA' or mov.tipoMovimiento.name() == 'DESCARTE_BIBLIOTECA'}">
                                Salida
                            </span>
                            <span class="badge bg-warning bg-opacity-10 text-warning border border-warning" 
                                  th:if="${mov.tipoMovimiento.name() == 'AJUSTE_MANUAL'}">
                                Ajuste
                            </span>
                            <small class="d-block text-muted mt-1" th:text="${mov.tipoMovimiento}">TIPO</small>
                        </td>
                        
                        <td class="fw-bold fs-5" th:classappend="${mov.tipoMovimiento.name() == 'INGRESO_PROVEEDOR' ? 'text-success' : ''}" th:text="${mov.cantidad}">1</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="modal fade" id="modalMovimiento" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-lg">
            <div class="modal-content border-0 shadow-lg" style="border-radius: 12px;">
                <div class="modal-header border-bottom-0 pb-0 pt-4 px-4">
                    <h5 class="modal-title fw-bold text-dark mb-1">Registrar Movimiento de Inventario</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                
                <div class="modal-body px-4 pt-4 pb-4">
                    <form th:action="@{/almacen/movimientos/registrar}" th:object="${nuevoMovimiento}" method="post" id="formMovimiento">
                        
                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label class="form-label small fw-bold text-muted">SUCURSAL <span class="text-danger">*</span></label>
                                <select class="form-select text-secondary" name="sucursalId" required>
                                    <option value="" selected>Seleccione la sucursal...</option>
                                    <option th:each="sucursal : ${sucursales}" th:value="${sucursal.id}" th:text="${sucursal.nombre}"></option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label small fw-bold text-muted">TIPO DE MOVIMIENTO <span class="text-danger">*</span></label>
                                <select class="form-select text-secondary" id="selectTipoMovimiento" th:field="*{tipoMovimiento}" required>
                                    <option value="" selected>Seleccione...</option>
                                    <optgroup label="Entradas de Stock">
                                        <option value="INGRESO_PROVEEDOR">Ingreso Proveedor (Nuevo Stock)</option>
                                        <option value="DEVOLUCION">Devolución de Cliente</option>
                                        <option value="TRASLADO_ENTRADA">Traslado - Entrada</option>
                                    </optgroup>
                                    <optgroup label="Salidas de Stock">
                                        <option value="VENTA_FISICA">Venta Física (Tienda)</option>
                                        <option value="VENTA_ONLINE">Venta Online</option>
                                        <option value="MERMA">Merma / Dañado</option>
                                        <option value="TRASLADO_SALIDA">Traslado - Salida</option>
                                        <option value="DESCARTE_BIBLIOTECA">Descarte / Baja</option>
                                    </optgroup>
                                    <optgroup label="Otros">
                                        <option value="AJUSTE_MANUAL">Ajuste Manual</option>
                                    </optgroup>
                                </select>
                            </div>
                        </div>

                        <div class="mb-3 border p-3 rounded bg-light" id="selectorTipoLibro">
                            <div class="form-check form-check-inline">
                                <input class="form-check-input" type="radio" name="esNuevoLibro" id="radioExistente" value="false" checked>
                                <label class="form-check-label fw-bold" for="radioExistente">Libro Existente</label>
                            </div>
                            <div class="form-check form-check-inline">
                                <input class="form-check-input" type="radio" name="esNuevoLibro" id="radioNuevo" value="true">
                                <label class="form-check-label fw-bold text-primary" for="radioNuevo">Nuevo Libro (Vía API)</label>
                            </div>
                        </div>

                        <div class="mb-3" id="zonaLibroExistente">
                            <label class="form-label small fw-bold text-muted">SELECCIONE EL LIBRO <span class="text-danger">*</span></label>
                            <select class="form-select text-secondary" id="selectLibro" th:field="*{libro}">
                                <option value="">Buscar título o ISBN...</option>
                                <option th:each="l : ${libros}" th:value="${l.id}" th:text="${l.titulo + ' (' + l.isbn + ')'}"></option>
                            </select>
                        </div>

                        <div class="mb-3" id="zonaLibroNuevo" style="display: none;">
                            <label class="form-label small fw-bold text-muted">NUEVO LIBRO (ISBN) <span class="text-danger">*</span></label>
                            <div class="input-group">
                                <input type="text" class="form-control" id="inputNuevoIsbn" name="nuevoIsbn" placeholder="Escriba el ISBN (ej. 9788437604947) y presione Enter">
                                <button class="btn btn-primary" type="button" id="btnBuscarApi">
                                    <i class="bi bi-search"></i> Buscar en API
                                </button>
                            </div>
                            
                            <div class="card mt-2 d-none" id="cardDatosApi">
                                <div class="card-body d-flex">
                                    <img id="apiImgPortada" src="" alt="Portada" width="60" class="me-3 rounded d-none">
                                    <div>
                                        <input type="text" class="form-control form-control-sm mb-1 fw-bold text-primary" id="apiTitulo" name="nuevoTitulo" readonly placeholder="Título del libro (Se llena solo)">
                                        <div class="d-flex gap-2 mt-2">
										    <input type="number" class="form-control form-control-sm" id="apiPaginas" name="nuevasPaginas" placeholder="Páginas" min="1">
										    
										    <input type="number" step="0.01" class="form-control form-control-sm" name="nuevoPrecio" id="apiPrecio" placeholder="Precio (S/)">
										    
										    <input type="hidden" id="apiImagen" name="nuevaImagen">
										    <input type="hidden" id="apiEditorial" name="nuevaEditorial"> 
										    
										    <select class="form-select form-select-sm" name="formato" id="apiFormato">
										        <option value="TAPA_BLANDA">Tapa blanda</option>
										        <option value="TAPA_DURA">Tapa dura</option>
										        <option value="DE_BOLSILLO">Bolsillo</option>
										    </select>
										</div>											
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="row mb-3">
                            <div class="col-md-4">
                                <label class="form-label small fw-bold text-muted">CANTIDAD <span class="text-danger">*</span></label>
                                <div class="input-group">
                                    <button class="btn btn-outline-secondary" type="button" id="btnRestar" style="background-color: #f8f9fa;"><i class="bi bi-dash"></i></button>
                                    <input type="number" class="form-control text-center font-monospace fw-bold" th:field="*{cantidad}" id="inputCantidad" value="1" min="1" required>
                                    <button class="btn btn-outline-secondary" type="button" id="btnSumar" style="background-color: #f8f9fa;"><i class="bi bi-plus"></i></button>
                                </div>
                            </div>
                            <div class="col-md-8">
                                <label class="form-label small fw-bold text-muted">TICKET / GUÍA (Opcional)</label>
                                <input type="text" class="form-control text-secondary" th:field="*{referenciaId}" placeholder="N.º de guía, factura o comprobante...">
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label small fw-bold text-muted">OBSERVACIONES</label>
                            <textarea class="form-control text-secondary" th:field="*{descripcion}" rows="2" placeholder="Motivo del movimiento, estado del libro..."></textarea>
                        </div>

                        <div class="d-flex justify-content-end gap-3">
                            <button type="button" class="btn btn-outline-secondary px-4" data-bs-dismiss="modal">Cancelar</button>
                            <button type="submit" class="btn btn-maroon px-4">Confirmar Movimiento</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/almacen.js}"></script>
</body>
</html>
