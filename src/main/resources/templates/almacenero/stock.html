<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alejandría Almacén - Stock General</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/almacen.css}">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-sbs py-0 mb-4">
        <div class="container-fluid px-4">
            <a class="navbar-brand py-3" href="#">Biblioteca Alejandría</a>
            <ul class="nav nav-tabs mx-auto">
                <li class="nav-item"><a class="nav-link" th:href="@{/almacen/movimientos}">Movimientos</a></li>
                <li class="nav-item"><a class="nav-link active" th:href="@{/almacen/stock}">Stock General</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/almacen/alertar}">Alertas</a></li>
            </ul>
            
            <div class="d-flex align-items-center gap-3">
                <div class="text-end d-none d-md-block">
                    <div class="fw-bold text-dark mb-0" style="font-size: 0.85rem;">
                        <i class="bi bi-person-circle me-1 text-muted"></i> 
                        <span sec:authentication="name">usuario@correo.com</span>
                    </div>
                    <div class="text-muted" style="font-size: 0.75rem;">Almacén</div>
                </div>
                
                <form th:action="@{/logout}" method="post" class="m-0">
                    <button type="submit" class="btn btn-outline-danger btn-sm rounded-pill px-3 fw-semibold">
                        <i class="bi bi-box-arrow-right"></i> Salir
                    </button>
                </form>
            </div>
            
        </div>
    </nav>

    <div class="container-fluid px-4 py-2">
        <h2 class="fw-semibold mb-4">Stock General</h2>
        
        <div class="table-responsive table-custom shadow-sm">
            <table class="table table-hover mb-0 align-middle">
                <thead>
                    <tr>
                        <th>LIBRO</th>
                        <th>ISBN</th>
                        <th>PRECIO (S/)</th>
                        <th>ESTADO CATÁLOGO</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="libro : ${libros}">
                        <td>
                            <div class="fw-semibold" th:text="${libro.titulo}">Título del Libro</div>
                            <small class="text-muted" th:text="${libro.slug}">/slug</small>
                        </td>
                        <td class="text-muted" th:text="${libro.isbn}">ISBN</td>
                        
                        <td class="fw-bold text-success" th:text="${libro.precioVentaActual}">0.00</td>
                        
                        <td>
                            <span th:if="${libro.activo}" class="badge bg-success-subtle text-success rounded-pill px-3">Activo</span>
                            <span th:unless="${libro.activo}" class="badge bg-danger-subtle text-danger rounded-pill px-3">Inactivo (Oculto)</span>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

</body>
</html>
