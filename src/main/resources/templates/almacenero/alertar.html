<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alejandría Almacén - Alertas Críticas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/almacen.css}">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-sbs py-0 mb-5">
        <div class="container-fluid px-4">
            <a class="navbar-brand py-3" href="#">Biblioteca Alejandría</a>
            <ul class="nav nav-tabs mx-auto">
                <li class="nav-item"><a class="nav-link" th:href="@{/almacen/movimientos}">Movimientos</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/almacen/stock}">Stock General</a></li>
                <li class="nav-item"><a class="nav-link active" th:href="@{/almacen/alertar}">Alertas</a></li>
            </ul>
            
            <div class="d-flex align-items-center gap-3">
                <div class="text-end d-none d-md-block">
                    <div class="fw-bold text-dark mb-0" style="font-size: 0.85rem;">
                        <i class="bi bi-person-circle me-1 text-muted"></i> 
                        <span sec:authentication="name">usuario@correo.com</span>
                    </div>
                    <div class="text-muted" style="font-size: 0.75rem;">Almacén</div>
                </div>
                
                <form th:action="@{/logout}" method="post" class="m-0">
                    <button type="submit" class="btn btn-outline-danger btn-sm rounded-pill px-3 fw-semibold">
                        <i class="bi bi-box-arrow-right"></i> Salir
                    </button>
                </form>
            </div>
            
        </div>
    </nav>

    <div class="container px-4 py-2" style="max-width: 1000px;">
        <h3 class="fw-bold mb-4">Alertas Críticas</h3>

        <div th:if="${#lists.isEmpty(listaAlertas)}" class="alert alert-success p-5 text-center shadow-sm" style="border-radius: 12px; border: none; background-color: #f0fdf4;">
            <i class="bi bi-shield-check text-success d-block mb-3" style="font-size: 3.5rem;"></i>
            <h4 class="fw-bold text-success mb-2">¡Todo el inventario está en orden!</h4>
            <p class="text-muted mb-0">No hay libros con stock bajo o agotado en este momento.</p>
        </div>

        <div th:each="alerta : ${listaAlertas}" 
             th:classappend="${alerta.estadoStock == 'AGOTADO' ? 'alert-danger-custom' : 'alert-warning-custom'}"
             class="alert-card p-4 mb-3 shadow-sm d-flex align-items-center justify-content-between">
            
            <div class="d-flex align-items-start gap-4">
                <div class="icon-circle flex-shrink-0" th:classappend="${alerta.estadoStock == 'AGOTADO' ? 'icon-danger' : 'icon-warning'}">
                    <i class="bi" th:classappend="${alerta.estadoStock == 'AGOTADO' ? 'bi-x-octagon-fill' : 'bi-exclamation-triangle-fill'}"></i>
                </div>
                
                <div>
                    <h5 class="fw-bold mb-0 text-dark" th:text="${alerta.titulo}">Título del Libro</h5>
                    <p class="text-muted small mb-2" th:text="${alerta.isbn + ' - Editorial ' + alerta.editorial}">ISBN - Editorial</p>
                    
                    <p class="small fw-bold mb-1" 
                       th:classappend="${alerta.estadoStock == 'AGOTADO' ? 'text-danger' : 'text-warning-custom'}"
                       th:text="${alerta.estadoStock == 'AGOTADO' ? 'Producto agotado — sin unidades disponibles' : 'Stock por debajo del mínimo establecido'}">
                    </p>
                    
                    <p class="text-muted small mb-0">
                        Stock actual: <span class="fw-bold text-dark" th:text="${alerta.cantidadDisponible + ' und'}">0 und</span> 
                        — Mínimo requerido: <span class="fw-bold text-dark" th:text="${alerta.stockMinimo + ' und'}">5 und</span>
                    </p>
                </div>
            </div>
            
            <div>
                <button class="btn btn-maroon rounded-pill px-4 py-2" style="font-size: 0.9rem;">
                    <i class="bi bi-cart3 me-1"></i> Generar orden de compra
                </button>
            </div>
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
