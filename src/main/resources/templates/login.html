<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Librería de Alejandría - Iniciar Sesión</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/css/estilos.css">
</head>
<body>

    <div class="container-fluid min-vh-100 p-0">
        <div class="row g-0 min-vh-100">
            
            <!-- Columna Izquierda: Imagen modular usando CSS -->
            <div class="col-md-6 d-none d-md-block bg-libreria-accesos"></div>
            
            <!-- Columna Derecha: Formulario -->
            <div class="col-md-6 d-flex align-items-center justify-content-center" style="background-color: #f8fafc;">
                <div class="card border-0 shadow-lg p-4 m-3 card-acceso">
                    
                    <div class="text-center mb-4">
                        <h3 class="fw-bold text-dark-ale" style="color: #8c3f3b; font-family: 'Georgia', serif;">Librería de Alejandría</h3>
                        <p class="text-muted small">Bienvenido a nuestra comunidad lectora</p>
                    </div>

                    <!-- Pestañas modulares -->
                    <ul class="nav nav-tabs justify-content-center mb-4 border-0 gap-3 nav-tabs-accesos">
                        <li class="nav-item">
                            <a class="nav-link active" href="/login">Iniciar Sesión</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="/catalogo/registro">Crear Cuenta</a>
                        </li>
                    </ul>

                    <div th:if="${param.error}" class="alert alert-danger py-2 small text-center" role="alert">
                        Credenciales incorrectas. Inténtalo de nuevo.
                    </div>

					<form th:action="@{/login}" method="POST">
					    <div class="mb-3">
					        <label for="username" class="form-label small fw-bold text-dark">Correo Electrónico</label>
					        <input type="email" id="username" name="username" class="form-control form-control-sm bg-light" required>
					    </div>

					    <div class="mb-2">
					        <label for="password" class="form-label small fw-bold text-dark">Contraseña</label>
					        <div class="input-group input-group-sm">
					            <input type="password" id="password" name="password" class="form-control bg-light" placeholder="••••••••" required>
					            <span class="input-group-text bg-light text-muted" id="togglePassword" style="cursor: pointer;"><i class="bi bi-eye"></i></span>
					        </div>
					    </div>

					    <div class="text-end mb-4">
					        <a href="#" class="text-decoration-none text-muted small" style="font-size: 0.8rem;">¿Olvidaste tu contraseña?</a>
					    </div>

					    <button type="submit" class="btn text-white fw-bold w-100 py-2 shadow-sm mb-3 btn-acceso-submit">
					        Iniciar Sesión
					    </button>
					</form>

                    <div class="text-center mt-2 txt-terminos-legal">
                        Al iniciar sesión, aceptas nuestros <a href="#" class="text-danger text-decoration-none">Términos de Servicio</a> y <a href="#" class="text-danger text-decoration-none">Política de Privacidad</a>.
                    </div>

                </div>
            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/funciones.js"></script>
</body>
</html>
