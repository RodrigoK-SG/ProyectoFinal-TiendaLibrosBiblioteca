<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Librería de Alejandría - Finalizar Compra</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/css/estilos.css">
</head>
<body class="bg-alejandria-page">

    <div th:replace="~{componentes/componente :: navbar}"></div>

    <div class="container mt-4 mb-5">
        
        <div class="mb-3">
            <a href="/catalogo" class="text-decoration-none btn-volver-catalogo">
                <i class="bi bi-chevron-left me-1"></i>Volver al catálogo
            </a>
        </div>

        <h2 class="fw-bold mb-4 font-editorial-titulo">Finalizar Compra</h2>

        <form th:action="@{/catalogo/checkout}" method="POST">
            <div class="row g-4">
                
                <div class="col-lg-8">
                    
                    <div class="card border-0 shadow-sm p-4 mb-4 bg-white">
                        <h5 class="fw-bold mb-3 text-dark"><span class="badge bg-coral-ale me-2">1</span>Datos del Cliente</h5>
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label small fw-bold text-muted">Tipo de Documento</label>
                                <select name="tipoDocumento" class="form-select form-select-sm bg-light" required>
                                    <option value="DNI">DNI</option>
                                    <option value="RUC">RUC</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label small fw-bold text-muted">Número de Documento</label>
                                <input type="text" name="numeroDocumento" class="form-control form-control-sm bg-light" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label small fw-bold text-muted">Nombre / Razón Social</label>
                                <input type="text" name="nombreRazonSocial" class="form-control form-control-sm bg-light" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label small fw-bold text-muted">Correo Electrónico</label>
                                <input type="email" name="emailContacto" class="form-control form-control-sm bg-light" required>
                            </div>
                        </div>
                    </div>

					<div class="card border-0 shadow-sm p-4 mb-4 bg-white" style="border-radius: 12px;">
					    <h5 class="fw-bold mb-3">
					        <span class="badge bg-danger me-2" style="background-color: #8c3f3b !important;">2</span> Tipo de Entrega
					    </h5>

					    <div class="form-check p-3 border rounded mb-3 container-option-select position-relative d-flex align-items-start">
					        <input class="form-check-input ms-1 mt-1" type="radio" name="tipoEntrega" id="entregaRecojo" value="RECOJO_TIENDA" checked style="cursor: pointer;">
					        <label class="form-check-label ms-3 fw-bold text-dark d-block w-100" for="entregaRecojo" style="cursor: pointer;">
					            <i class="bi bi-shop me-2 text-secondary"></i>Recojo en Tienda
					            <span class="d-block small text-muted fw-normal mt-1">Gratis • Disponible hoy mismo</span>
					        </label>
					    </div>

					    <div class="form-check p-3 border rounded container-option-select position-relative d-flex align-items-start flex-column">
					        <div class="w-100 d-flex align-items-start">
					            <input class="form-check-input ms-1 mt-1" type="radio" name="tipoEntrega" id="entregaDelivery" value="DELIVERY" style="cursor: pointer;">
					            <label class="form-check-label ms-3 fw-bold text-dark d-block w-100" for="entregaDelivery" style="cursor: pointer;">
					                <i class="bi bi-truck me-2 text-secondary"></i>Delivery a Domicilio
					                <span class="d-block small text-muted fw-normal mt-1">S/ 5.99 • Entrega en 24-48 hrs</span>
					            </label>
					        </div>
					        
					        <div id="sectionDireccionEnvio" class="row g-2 mt-3 w-100 d-none ps-3">
					            <div class="col-md-8">
					                <input type="text" name="direccionCompleta" class="form-control form-control-sm bg-light" placeholder="Dirección de Envío">
					            </div>
					            <div class="col-md-4">
					                <input type="text" name="codigoPostal" class="form-control form-control-sm bg-light" placeholder="Código Postal">
					            </div>
					        </div>
					    </div>
					</div>

                    <div class="card border-0 shadow-sm p-4 bg-white">
                        <h5 class="fw-bold mb-3 text-dark"><span class="badge bg-coral-ale me-2">3</span>Método de Pago</h5>
                        <div class="d-flex flex-column gap-2">
                            <div class="form-check p-3 border rounded container-option-select">
                                <input class="form-check-input ms-1" type="radio" name="metodoPago" id="pagoTarjeta" value="TARJETA_CREDITO" checked>
                                <label class="form-check-label ms-3 fw-bold text-dark" for="pagoTarjeta"><i class="bi bi-credit-card me-2 text-secondary"></i>Tarjeta de Crédito / Débito</label>
                            </div>
                            <div class="form-check p-3 border rounded container-option-select">
                                <input class="form-check-input ms-1" type="radio" name="metodoPago" id="pagoYape" value="YAPE">
                                <label class="form-check-label ms-3 fw-bold text-dark" for="pagoYape"><i class="bi bi-qr-code me-2 text-secondary"></i>Yape</label>
                            </div>
                            <div class="form-check p-3 border rounded container-option-select">
                                <input class="form-check-input ms-1" type="radio" name="metodoPago" id="pagoPlin" value="PLIN">
                                <label class="form-check-label ms-3 fw-bold text-dark" for="pagoPlin"><i class="bi bi-phone me-2 text-secondary"></i>Plin</label>
                            </div>
                            <div class="form-check p-3 border rounded container-option-select">
                                <input class="form-check-input ms-1" type="radio" name="metodoPago" id="pagoEfectivo" value="EFECTIVO">
                                <label class="form-check-label ms-3 fw-bold text-dark" for="pagoEfectivo"><i class="bi bi-cash-coin me-2 text-secondary"></i>Efectivo</label>
                            </div>
                        </div>
                    </div>

                </div> <div class="col-lg-4">
                    <div class="card border-0 shadow-sm p-4 bg-white sticky-top" style="top: 20px;">
                        <h5 class="fw-bold mb-3 border-bottom pb-2">Resumen del Pedido</h5>
                        
                        <div class="d-flex align-items-center gap-3 mb-3 border-bottom pb-3">
                            <img src="https://images.unsplash.com/photo-1544947950-fa07a98d237f?q=80&w=150" class="rounded img-mini-checkout" alt="Libro">
                            <div class="overflow-hidden">
                                <h6 class="fw-bold mb-0 text-truncate">El Arte de la Ficción</h6>
                                <p class="text-muted small mb-1">David Lodge</p>
                                <strong class="text-dark small">S/ 85.00</strong>
                            </div>
                        </div>

                        <label class="form-label small fw-bold text-muted mb-2">Comprobante de Pago</label>
                        <div class="btn-group btn-group-sm w-100 mb-4" role="group">
                            <input type="radio" class="btn-check" name="tipoComprobante" id="compBoleta" value="BOLETA" checked>
                            <label class="btn btn-outline-secondary" for="compBoleta">Boleta</label>

                            <input type="radio" class="btn-check" name="tipoComprobante" id="compFactura" value="FACTURA">
                            <label class="btn btn-outline-secondary" for="compFactura">Factura</label>
                        </div>

                        <div class="d-flex justify-content-between mb-2 small text-muted">
                            <span>Subtotal</span>
                            <span>S/ 85.00</span>
                        </div>
                        <div class="d-flex justify-content-between mb-2 small text-muted">
                            <span>Costo de Envío</span>
                            <span id="txtCostoEnvio">S/ 0.00</span>
                        </div>
                        <div class="d-flex justify-content-between mb-3 small text-muted">
                            <span>IGV (18%)</span>
                            <span>S/ 15.30</span>
                        </div>
                        <hr class="opacity-25">
                        
                        <div class="d-flex justify-content-between align-items-center mb-4">
                            <span class="fw-bold">Total</span>
                            <h4 class="fw-bold m-0 text-dark-ale" id="txtTotalPedido">S/ 100.30</h4>
                        </div>

                        <div class="d-grid gap-2 mt-4">
                            <button type="submit" class="btn text-white fw-bold py-3 shadow btn-checkout-proceder">
                                Completar Pedido
                            </button>
                        </div>

                        <div class="text-center text-muted mt-3">
                            <small class="txt-terminos-legal">
                                <i class="bi bi-lock-fill me-1 text-success"></i>Pago 100% seguro y encriptado
                            </small>
                        </div>

                    </div>
                </div> </div> </form>
    </div>

    <div th:replace="~{componentes/componente :: footer}"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/funciones.js"></script>
</body>
</html>
