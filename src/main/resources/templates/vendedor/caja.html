<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Vendedor - Punto de Caja</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/css/estilos-vendedor.css">
</head>
<body class="bg-light vh-100 overflow-hidden d-flex flex-column">

    <div th:replace="~{componentes/componente-vendedor :: navbar-vendedor}"></div>

    <div class="container-fluid flex-grow-1 p-0 d-flex overflow-hidden">
        
        <div class="col-8 p-4 d-flex flex-column h-100 overflow-auto bg-alejandria-page" style="background-color: #fdfbf7;">
            <div class="mb-4">
                <div class="input-group shadow-sm border-0 rounded-pill bg-white overflow-hidden p-1">
                    <span class="input-group-text bg-white border-0 text-muted ps-4"><i class="bi bi-search"></i></span>
                    <input type="text" class="form-control border-0 shadow-none bg-white" placeholder="Buscar libro por Título o ISBN (Ej. Dune)...">
                </div>
            </div>

            <div class="row row-cols-1 row-cols-md-3 row-cols-lg-4 g-4 pb-4">
                
                <div class="col" th:each="libro : ${libros}">
                    <div class="card h-100 border-0 shadow-sm rounded-4 hover-shadow position-relative cursor-pointer libro-card">
                        
                        <div class="p-3 bg-white text-center rounded-top-4" style="height: 220px;">
                            <img th:src="${libro.imagenPortada != null && !libro.imagenPortada.empty ? libro.imagenPortada : '/img/libros/default.jpg'}" 
                                 class="img-fluid h-100 object-fit-contain drop-shadow" 
                                 th:alt="${libro.titulo}">
                        </div>
                        
                        <div class="card-body p-3 bg-white rounded-bottom-4 d-flex flex-column justify-content-between">
                            <h6 class="fw-bold text-dark mb-1 text-truncate" style="font-family: 'Georgia', serif;" th:text="${libro.titulo}">Dune</h6>
                            <p class="text-muted small mb-3" th:text="${#strings.capitalize(#strings.toLowerCase(libro.formato))}"></p>
                            
                            <div class="d-flex justify-content-between align-items-center mt-auto">
                                <span class="badge bg-success-subtle text-success border border-success-subtle px-2 py-1 rounded-pill small">Disponible</span>
                                <span class="fw-bold fs-5 text-dark" th:text="'S/ ' + ${libro.precioVentaActual}">S/ 0.00</span>
                            </div>
                        </div>
                        <button class="btn btn-danger btn-sm position-absolute top-0 end-0 m-2 rounded-circle shadow d-none btn-add" style="background-color: #c86b66; border: none; width: 35px; height: 35px;">
                            <i class="bi bi-plus-lg"></i>
                        </button>
                    </div>
                </div>
                
            </div>
        </div>

        <div class="col-4 bg-white shadow-lg z-1 d-flex flex-column h-100 border-start">
            <div class="p-4 flex-grow-1 d-flex flex-column overflow-hidden">
                
                <h5 class="fw-bold mb-4" style="font-family: 'Georgia', serif;">Detalle de Venta</h5>

                <div class="input-group mb-4">
                    <span class="input-group-text bg-light border-end-0"><i class="bi bi-person-vcard"></i></span>
                    <input type="text" class="form-control bg-light border-start-0" placeholder="Buscar Cliente (DNI/RUC opcional)">
                </div>

                <div class="flex-grow-1 overflow-auto pe-2 mb-4">
                </div>

                <div class="mt-auto border-top pt-3">
                    
                    <div class="btn-group w-100 mb-3 rounded-pill bg-light p-1" role="group">
                        <input type="radio" class="btn-check" name="btncomprobante" id="btnBoleta" autocomplete="off" checked>
                        <label class="btn btn-outline-danger border-0 rounded-pill fw-bold" for="btnBoleta">Boleta</label>

                        <input type="radio" class="btn-check" name="btncomprobante" id="btnFactura" autocomplete="off">
                        <label class="btn btn-outline-danger border-0 rounded-pill fw-bold text-muted" for="btnFactura">Factura</label>
                    </div>

                    <p class="small fw-bold text-muted mb-2">Método de Pago</p>
                    <div class="row g-2 mb-4">
                        <div class="col-6"><button class="btn btn-outline-secondary w-100 rounded-3 py-2"><i class="bi bi-cash-coin me-2 text-success"></i>Efectivo</button></div>
                        <div class="col-6"><button class="btn btn-outline-primary w-100 rounded-3 py-2"><i class="bi bi-credit-card-2-front me-2"></i>Tarjeta</button></div>
						<div class="col-6"><button class="btn btn-outline-secondary w-100 rounded-3 py-2 text-dark border-purple" style="border-color: #8b3dff;"><i class="bi bi-qr-code-scan me-2" style="color: #8b3dff;"></i>Yape</button></div>
						<div class="col-6"><button class="btn btn-outline-info w-100 rounded-3 py-2 text-dark"><i class="bi bi-phone-vibrate me-2 text-info"></i>Plin</button></div>
                    </div>

                    <div class="d-flex justify-content-between mb-1 small text-muted">
                        <span>Subtotal</span>
                        <span>S/ 0.00</span>
                    </div>
                    <div class="d-flex justify-content-between mb-3 small text-muted">
                        <span>IGV (18%)</span>
                        <span>S/ 0.00</span>
                    </div>
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <h5 class="fw-bold mb-0">Total a Cobrar</h5>
                        <h3 class="fw-bold mb-0 text-dark">S/ 0.00</h3>
                    </div>

                    <button class="btn btn-danger w-100 py-3 fw-bold fs-5 rounded-4 shadow" style="background-color: #c86b66; border: none;">
                        COBRAR S/ 0.00
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/vendedor.js"></script>
</body>
</html>
