<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Librería de Alejandría - Registro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/css/estilos.css">
</head>
<body>

    <div class="container-fluid min-vh-100 p-0">
        <div class="row g-0 min-vh-100">
            
            <div class="col-md-6 d-none d-md-block bg-libreria-accesos"></div>
            
            <div class="col-md-6 d-flex align-items-center justify-content-center py-4" style="background-color: #f8fafc;">
                <div class="card border-0 shadow-lg p-4 m-3 card-acceso">
                    
                    <div class="text-center mb-4">
                        <h3 class="fw-bold" style="color: #8c3f3b; font-family: 'Georgia', serif;">Librería de Alejandría</h3>
                        <p class="text-muted small">Bienvenido a nuestra comunidad lectora</p>
                    </div>

                    <ul class="nav nav-tabs justify-content-center mb-4 border-0 gap-3 nav-tabs-accesos">
                        <li class="nav-item">
                            <a class="nav-link" href="/catalogo/vista-login">Iniciar Sesión</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link active" href="/registro">Crear Cuenta</a>
                        </li>
                    </ul>

					<form th:action="@{/registro}" method="POST">
					    
					    <div class="mb-3">
					        <label for="nombreRazonSocial" class="form-label small fw-bold text-dark">Nombre Completo</label>
					        <input type="text" id="nombreRazonSocial" name="nombreRazonSocial" class="form-control form-control-sm bg-light" required>
					    </div>

					    <div class="mb-3">
					        <label for="tipoDocumento" class="form-label small fw-bold text-dark">Tipo de Documento</label>
					        <select id="tipoDocumento" name="tipoDocumento" class="form-select form-select-sm bg-light" required>
					            <option value="DNI">DNI</option>
					            <option value="RUC">RUC</option>
					        </select>
					    </div>

					    <div class="mb-3">
					        <label for="numeroDocumento" class="form-label small fw-bold text-dark">Número de Documento</label>
					        <input type="text" id="numeroDocumento" name="numeroDocumento" class="form-control form-control-sm bg-light" required>
					    </div>

					    <div class="mb-3">
					        <label for="email" class="form-label small fw-bold text-dark">Correo Electrónico</label>
					        <input type="email" id="email" name="email" class="form-control form-control-sm bg-light" required>
					    </div>

					    <div class="mb-4">
					        <label for="password" class="form-label small fw-bold text-dark">Contraseña</label>
					        <input type="password" id="password" name="password" class="form-control form-control-sm bg-light" required>
					    </div>

					    <button type="submit" class="btn text-white fw-bold w-100 py-2 shadow-sm btn-acceso-submit">
					        Registrarse
					    </button>
					</form>

                </div>
            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/funciones.js"></script>
</body>
</html>
