<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Librería de Alejandría - Contáctanos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/css/estilos.css">
</head>
<body class="bg-alejandria-page">

    <div th:replace="~{componentes/componente :: navbar}"></div>

    <!-- BANNER PRINCIPAL STYLISH -->
    <div class="banner-reglamento text-white text-center py-5 position-relative shadow-sm">
        <div class="container py-3 position-relative z-1">
            <h1 class="fw-bold display-5 mb-2 text-glow" style="font-family: 'Georgia', serif; color: #fdfbf7;">Contáctanos</h1>
            <div class="mx-auto my-3" style="width: 60px; height: 3px; background-color: #c86b66; border-radius: 2px;"></div>
            <p class="mx-auto text-white-50 text-uppercase fw-semibold tracking-wider" style="font-size: 0.75rem; letter-spacing: 2px;">Estamos aquí para atender tus consultas comerciales e institucionales</p>
        </div>
        <div class="position-absolute top-0 start-0 w-100 height-100 opacity-10 bg-grid-overlay"></div>
    </div>

    <main class="container my-5" style="max-width: 1050px;">
        <div class="mb-4">
            <a href="/catalogo" class="text-decoration-none text-muted small"><i class="bi bi-chevron-left me-1"></i>Volver al catálogo</a>
        </div>

        <div class="card border-0 shadow-sm overflow-hidden bg-white" style="border-radius: 16px;">
            <div class="row g-0">
                <!-- COLUMNA IZQUIERDA: FORMULARIO -->
                <div class="col-md-7 p-4 p-md-5">
                    <h4 class="fw-bold text-dark mb-4" style="font-family: 'Georgia', serif;">Envíanos un mensaje</h4>
                    <form th:action="@{/catalogo/contacto/enviar}" method="POST">
                        <div class="mb-3">
                            <label class="form-label text-secondary small fw-bold">Nombre Completo</label>
                            <input type="text" name="nombre" class="form-control bg-light" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label text-secondary small fw-bold">Correo Electrónico</label>
                            <input type="email" name="email" class="form-control bg-light" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label text-secondary small fw-bold">Asunto / Motivo</label>
                            <select name="asunto" class="form-select bg-light">
                                <option value="GENERAL">Consulta General</option>
                                <option value="INSTITUCIONAL">Abastecimiento Institucional (B2B)</option>
                                <option value="BIBLIOTECA">Soporte de Préstamos o Multas</option>
                            </select>
                        </div>
                        <div class="mb-4">
                            <label class="form-label text-secondary small fw-bold">Mensaje</label>
                            <textarea name="mensaje" class="form-control bg-light" rows="4" placeholder="Escribe tu requerimiento detalladamente..." required></textarea>
                        </div>
                        <button type="submit" class="btn text-white fw-bold w-100 py-2" style="background-color: #c86b66; border-radius: 8px;">ENVIAR MENSAJE</button>
                    </form>
                </div>

                <!-- COLUMNA DERECHA: INFO CORPORATIVA -->
                <div class="col-md-5 p-4 p-md-5 d-flex flex-column justify-content-center" style="background-color: #f5eee1;">
                    <h5 class="fw-bold text-dark mb-4" style="font-family: 'Georgia', serif;">Canales Oficiales</h5>
                    
                    <div class="d-flex align-items-start mb-3">
                        <i class="bi bi-geo-alt-fill text-danger me-3 fs-5" style="color: #c86b66 !important;"></i>
                        <div>
                            <h6 class="fw-bold text-dark small mb-1">Sede Principal</h6>
                            <p class="text-muted small m-0">Lima Centro</p>
                        </div>
                    </div>
                    
                    <div class="d-flex align-items-start mb-3">
                        <i class="bi bi-building text-secondary me-3 fs-5"></i>
                        <div>
                            <h6 class="fw-bold text-dark small mb-1">Sucursales</h6>
                            <p class="text-muted small m-0">Zona Norte</p>
                        </div>
                    </div>

                    <div class="d-flex align-items-start">
                        <i class="bi bi-envelope-open-fill text-secondary me-3 fs-5"></i>
                        <div>
                            <h6 class="fw-bold text-dark small mb-1">Correos Electrónicos</h6>
                            <p class="text-muted small m-0">contacto@alejandria.com.pe</p>
                            <p class="text-muted small m-0">instituciones@alejandria.com.pe</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div th:replace="~{componentes/componente :: footer}"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
