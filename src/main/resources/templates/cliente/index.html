<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Librería de Alejandría - Catálogo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/css/estilos.css">
</head>
<body>

    <div th:replace="~{componentes/componente :: navbar}"></div>

    <div class="container mt-4">
        <div class="row">
            
            <aside class="col-md-3">
                <div class="card p-3 border-light shadow-sm bg-white">
                    <h5 class="fw-bold mb-3"><i class="bi bi-funnel me-2"></i>Filtros</h5>
                    
                    <h6 class="fw-bold text-muted small text-uppercase">Categoría</h6>
                    <div class="mb-3">
                        <div class="form-check mb-1" th:each="cat : ${categorias}">
                            <input class="form-check-input" type="checkbox" th:value="${cat.id}" th:id="'cat-' + ${cat.id}">
                            <label class="form-check-label" th:for="'cat-' + ${cat.id}" th:text="${cat.nombre}">Ficción</label>
                        </div>
                    </div>

                    <h6 class="fw-bold text-muted small text-uppercase">Formato</h6>
                    <div class="mb-3">
                        <div class="form-check mb-1"><input class="form-check-input" type="checkbox"><label class="form-check-label">Tapa Blanda</label></div>
                        <div class="form-check mb-1"><input class="form-check-input" type="checkbox"><label class="form-check-label">Tapa Dura</label></div>
                    </div>
                </div>
            </aside>

            <main class="col-md-9">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h4 class="fw-bold m-0">Catálogo de Libros</h4>
                    <span class="text-muted" th:text="${libros.size() + ' resultados'}">0 resultados</span>
                </div>

                <div class="row row-cols-1 row-cols-md-4 g-3">
                    <div class="col" th:each="libro : ${libros}">
                        <div class="card h-100 text-center border-0 shadow-sm p-2 bg-white">
							<img th:src="${libro.imagenPortada != null ? libro.imagenPortada : 'https://via.placeholder.com/150x200'}" 
							     class="card-img-top rounded mx-auto img-portada-catalogo" th:alt="${libro.titulo}">
                            
                            <div class="card-body p-2 d-flex flex-column justify-content-between">
                                <div>
                                    <h6 class="fw-bold text-truncate mb-0" th:text="${libro.titulo}">Título del Libro</h6>
                                    
                                    <p class="text-muted small mb-2 text-truncate" 
                                       th:text="${!libro.autores.isEmpty() ? libro.autores[0].nombre : 'Autor Anónimo'}">Nombre del Autor</p>
                                    
                                    <div class="my-2 p-1 rounded bg-light small">
                                        <div class="d-flex justify-content-between px-2">
                                            <span>Precio Venta:</span> 
                                            <strong th:text="'S/ ' + ${libro.precioVentaActual}">S/ 0.00</strong>
                                        </div>
                                        <div class="d-flex justify-content-between px-2 text-danger">
                                            <span>Precio Alquiler:</span> 
                                            <span th:text="'S/ ' + ${libro.precioAlquilerActual}">S/ 0.00</span>
                                        </div>
                                    </div>
                                </div>
								<div class="d-grid gap-1 mt-auto">
									<form th:action="@{/catalogo/carrito/agregar}" method="POST">
									    <input type="hidden" name="libroId" th:value="${libro.id}" />
									    <input type="hidden" name="cantidad" value="1" />
									    
									    <button type="submit" class="btn btn-sm text-white fw-bold w-100" style="background-color: #c86b66;">
									        Añadir al Carrito
									    </button>
									</form>
								    <a th:href="@{/catalogo/libro/{slug}(slug=${libro.slug})}" class="btn btn-outline-secondary btn-sm">Ver detalle</a>
								</div>
                            </div>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <div th:replace="~{componentes/componente :: footer}"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/funciones.js"></script>
</body>
</html>
