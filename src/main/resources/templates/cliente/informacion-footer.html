<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="'Librería de Alejandría - ' + ${tituloPagina}">Librería de Alejandría - Información</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
</head>
<body style="background-color: #fcfbf7;">

    <div th:replace="~{componentes/componente :: navbar}"></div>

    <div class="container my-5 py-5 text-center bg-white shadow-sm rounded" style="max-width: 700px;">
        <div class="p-4">
            <i class="bi bi-journal-bookmark-fill mb-3" style="font-size: 4rem; color: #c86b66 !important;"></i>
            <h2 class="fw-bold text-dark mb-3" th:text="${tituloPagina}">Nuestra Historia</h2>
            <p class="text-muted fs-5">Esta sección de la **Librería de Alejandría** se encuentra actualmente en mantenimiento técnico u optimización de contenidos.</p>
            <hr class="my-4 opacity-25">
            <a href="/catalogo" class="btn text-white fw-bold px-4 py-2" style="background-color: #c86b66; border-radius: 8px;">
                <i class="bi bi-arrow-left me-2"></i>Volver al Catálogo
            </a>
        </div>
    </div>

    <div th:replace="~{componentes/componente :: footer}"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
